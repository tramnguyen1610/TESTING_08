{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kim Lien Minimart</title>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
    <style>
body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arimo', sans-serif;
            box-sizing: border-box;
            overflow: hidden; /* Ép ẩn hoàn toàn thanh cuộn */
        }

        .login-container {
            display: flex;
            width: 100vw;  /* Rộng 100% màn hình */
            height: 100vh; /* Cao 100% màn hình */
            margin: 0;
        }

        /* Nửa bên trái - Chứa ảnh và logo */
        .brand-section {
            flex: 1; /* Tự động chia đôi màn hình với form-section */
            height: 100%;
            background: linear-gradient(180deg, #FFC61A 54%, #FFC92A 100%);
            display: flex;
            flex-direction: column;
            justify-content: center; /* Căn giữa theo chiều dọc */
            align-items: center;     /* Căn giữa theo chiều ngang */
            position: relative;
        }

        .logo-img {
            width: 258px;
            height: auto; /* Để auto để giữ đúng tỷ lệ logo */
            margin-bottom: 20px; /* Khoảng cách giữa logo và ngôi nhà */
        }

        .house-img {
            width: 60%; /* Tự động thu phóng ảnh ngôi nhà theo màn hình */
            max-width: 500px;
            height: auto;
        }

        /* Nửa bên phải - Chứa Form đăng nhập */
        .form-section {
            flex: 1; /* Tự động chia đôi màn hình */
            height: 100%;
            background-color: #FFF8E1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Căn giữa nội dung theo chiều dọc */
            align-items: center;
        }

        .system-title {
            color: #ED1B24;
            font-size: 38px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            width: 80%;
        }

        /* CSS cho thông báo lỗi */
        .error-message {
            color: #ED1B24; /* Màu đỏ đồng bộ với nút đăng nhập */
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            background-color: #ffeaea;
            padding: 10px 20px;
            border-radius: 8px;
            width: 486px; /* Bằng với input text trừ đi padding */
        }

        .login-box {
            width: 630px;
            height: 479px;
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .input-group {
            margin-bottom: 25px;
            width: 526px;
        }

        .input-group label {
            display: block;
            color: #5B5B5B;
            font-size: 24px; /* Scaled slightly for better web proportion, adjust to 32 if strictly needed */
            margin-bottom: 10px;
        }

        .input-group input {
            width: 526px;
            height: 60px;
            border: 1px solid #5B5B5B;
            border-radius: 8px;
            font-size: 20px;
            padding: 0 15px;
            box-sizing: border-box;
            color: #5B5B5B;
            font-family: 'Arimo', sans-serif;
        }

        .password-container {
            position: relative;
        }

        .icon-cant-see {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 24px;
            /* Update src to: {% static 'icons/29_IconCantSee.png' %} */
        }

        .btn-login {
            width: 526px;
            height: 78px;
            background-color: #ED1B24;
            color: #FFFFFF;
            font-size: 32px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Arimo', sans-serif;
        }

        .btn-login:hover {
            background-color: #d1161d;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-section">
        <img src="{% static 'logo/Logo.png' %}" alt="Kim Lien Logo" class="logo-img">
        <img src="{% static 'images/1_Login_house.png' %}" alt="Storefront" class="house-img">
    </div>

    <div class="form-section">
        <div class="system-title">Hệ thống hỗ trợ quản lý Kim Liên Minimart</div>
        
        <div class="login-box">

            <div class="error-message" id="errorDiv" style="display: none;"></div>

            <form id="loginForm" onsubmit="submitLogin(event)">
                {% csrf_token %}
                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username">
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-container">
                        <input type="password" id="password" name="password">
                        <span class="icon-cant-see" id="eyeIcon" onclick="togglePassword()" style="cursor: pointer;">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>

            <script>
                // 1. Hàm kiểm tra hợp lệ tại chỗ (JS)
                function validateLogin() {
                    const u = document.getElementById('username').value.trim();
                    const p = document.getElementById('password').value.trim();

                    if (u === '' || p === '') {
                        alert("Vui lòng nhập đầy đủ thông tin");
                        return false;
                    }

                    if (u.length <= 5 || u.length >= 20) {
                        alert("Tên đăng nhập phải trên 5 ký tự và phải dưới 20 ký tự");
                        return false;
                    }
                    return true;
                }

                // 2. Hàm gửi dữ liệu lên Server không làm tải lại trang
                function submitLogin(event) {
                    event.preventDefault(); // Chặn hành động chuyển trang mặc định của Form

                    // Nếu JS kiểm tra lỗi thì dừng lại luôn
                    if (!validateLogin()) return;

                    const form = document.getElementById('loginForm');
                    const formData = new FormData(form);

                    fetch("", {
                        method: "POST",
                        body: formData,
                        headers: {
                            "X-Requested-With": "XMLHttpRequest" // Báo cho Server biết đây là AJAX
                        }
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Báo thành công và chuyển trang
                            alert("Đăng nhập thành công.");
                            window.location.href = "{% url 'dashboard' %}";
                        } else {
                            // Nếu sai pass hoặc lỗi, hiện khung đỏ
                            const errDiv = document.getElementById('errorDiv');
                            errDiv.textContent = "⚠️ " + data.message;
                            errDiv.style.display = "block";
                        }
                    })
                    .catch(err => {
                        console.error("Lỗi kết nối:", err);
                    });
                }

                // 3. Hàm Ẩn/Hiện mật khẩu
                function togglePassword() {
                    const passwordInput = document.getElementById('password');
                    const eyeIcon = document.getElementById('eyeIcon');

                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        eyeIcon.textContent = '🙈';
                    } else {
                        passwordInput.type = 'password';
                        eyeIcon.textContent = '👁️';
                    }
                }
            </script>
        </div>
    </div>
</div>

</body>
</html>
