{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kim Liên Minimart{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Arimo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. RESET & FULL SCREEN LAYOUT */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #FFC92A; /* Nền vàng bao phủ toàn bộ vùng nội dung giống Login */
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            margin: 0; /* Đảm bảo menu sát kịch lề trái */
        }

        /* 2. SIDEBAR STYLE (Trắng, sát trái) */
        .sidebar {
            width: 280px; /* Độ rộng chuẩn theo thiết kế */
            height: 100%;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* Logo Header trong Sidebar */
        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #F0F0F0;
            margin-bottom: 10px;
        }

        .logo-box img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
        }

        .brand-info .brand-name {
            color: #FFC92A;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        .brand-info .brand-sub {
            color: #5B5B5B;
            font-size: 14px;
            margin: 5px 0 0;
        }

        /* Nhãn phân đoạn (Tổng quan, Quản lý) */
        .menu-section-label {
            padding: 20px 25px 10px;
            color: #888;
            font-size: 14px;
            font-weight: bold;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
        }

        /* 3. MENU ITEM & HIỆU ỨNG VÀNG */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: #5B5B5B;
            font-size: 17px;
            transition: 0.2s;
        }

        /* Hiệu ứng khi nhấp vào/đang ở trang đó: Nền vàng toàn bộ item */
        .menu-item.active {
            background-color: #FFC92A; /* Màu vàng thương hiệu */
            color: #333;
            font-weight: bold;
        }

        .menu-item:hover:not(.active) {
            background-color: #FFF8E1;
        }

        .menu-icon {
            margin-right: 15px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 4. MAIN CONTENT AREA */
        .main-container {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 40px; /* Khoảng cách để thấy nền vàng xung quanh */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .content-body {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Đẩy Cài đặt xuống cuối */
        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid #F0F0F0;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <img src="{% static 'logo/Logo.png' %}" alt="Logo">
            </div>
            <div class="brand-info">
                <p class="brand-name">Kim Liên</p>
                <p class="brand-sub">Quản lý</p>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-section-label">Tổng quan</div>
            <a href="{% url 'dashboard' %}" class="menu-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <span class="menu-icon"><img src="{% static 'icons/2_IconDashboard.png' %}" alt="icon"></span> Dashboard
            </a>

            <div class="menu-section-label">Quản lý</div>
            <a href="{% url 'danh_sach_ncc' %}" class="menu-item {% if request.resolver_match.url_name == 'danh_sach_ncc' %}active{% endif %}">
                <span class="menu-icon"><img src="{% static 'icons/3_IconSupplier.png' %}" alt="icon"></span> Nhà cung cấp
            </a>

            <a href="{% url 'danh_sach_phieu_nhap' %}" class="menu-item {% if request.resolver_match.url_name == 'danh_sach_phieu_nhap' %}active{% endif %}">
                <span class="menu-icon"><img src="{% static 'icons/4_IconImportGoods.png' %}" alt="icon"></span> Nhập hàng
            </a>

            <a href="{% url 'danh_sach_lo_hang' %}" class="menu-item {% if request.resolver_match.url_name == 'danh_sach_lo_hang' %}active{% endif %}">
                <span class="menu-icon"><img src="{% static 'icons/5_IconShipment.png' %}" alt="icon"></span> Lô hàng
            </a>

            <a href="{% url 'danh_sach_sp' %}" class="menu-item {% if request.resolver_match.url_name == 'danh_sach_sp' %}active{% endif %}">
                <span class="menu-icon"><img src="{% static 'icons/6_IconProduct.png' %}" alt="icon"></span> Sản phẩm
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="{% url 'cai_dat' %}" class="menu-item {% if request.resolver_match.url_name == 'cai_dat' %}active{% endif %}">
                <span class="menu-icon"><img src="{% static 'icons/10_IconSetting.png' %}" alt="icon"></span> Cài đặt
            </a>
        </div>
    </nav>

    <main class="main-container">
        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

</body>
</html>
